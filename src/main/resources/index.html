<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Board CRUD</title>
</head>
<body>
    <div>
        <h2>Create or Edit post</h2>
        <input type="hidden" id="postId">
        <input type="text" id="author" placeholder="author"><br>
        <input type="password" id="password" placeholder="password"><br>
        <input type="text" id="title" placeholder="title"><br>
        <textarea id="content" placeholder="content"></textarea><br>
        <button type="button" id="submitBtn" onclick="handleSave()">save</button>
        <button type="button" onclick="resetForm()">reset</button>
    </div>

    <hr>

    <div>
        <h2>Post List</h2>
        <button type="button" onclick="loadPosts()">Refresh</button>
        <table border="1">
            <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="postTableBody"></tbody>
        </table>
    </div>

    <script>
        const API_BASE = '/api/post'

        async function loadPosts() {
            try {
                const res = await fetch(API_BASE)
                const posts = await res.json();

                const tbody = document.getElementById('postTableBody');
                tbody.innerHTML = '';

                posts.postResponses.forEach(post => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${post.id}</td>
                        <td>${post.title}</td>
                        <td>${post.author}</td>
                        <td>
                            <button onclick="fillForm(${JSON.stringify(post).replace(/"/g, '&quot;')})">수정</button>
                            <button onclick="deletePost(${post.id})">delete</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function handleSave() {
            const id = document.getElementById('postId').value;
            const payload = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                author: document.getElementById('author').value,
                password: document.getElementById('password').value
            };

            const url = id ? `${API_BASE}/${id}` : API_BASE;
            const method = id ? 'PATCH' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert('success');
                    resetForm();
                    loadPosts();
                } else {
                    alert(`ERROR: ${res.status}`)
                }
            } catch (e) { console.error(e); }
        }

        async function deletePost(id) {
            const password = prompt("Please enter the password.");
            if (!password) return;

            try {
                const res = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                if (res.ok) {
                    alert('Deleted');
                    loadPosts();
                } else {
                    alert(`ERROR: ${res.status}`)
                }
            } catch (e) { console.error(e); }
        }

        function fillForm(post) {
            document.getElementById('postId').value = post.id;
            document.getElementById('title').value = post.title;
            document.getElementById('author').value = post.author;
            document.getElementById('content').value = post.content;
            document.getElementById('submitBtn').innerText = 'edit';
        }

        function resetForm() {
            document.getElementById('postId').value = '';
            document.getElementById('title').value = '';
            document.getElementById('author').value = '';
            document.getElementById('content').value = '';
            document.getElementById('password').value = '';
            document.getElementById('submitBtn').innerText = 'save';
        }

        window.onload = loadPosts;
    </script>
</body>
</html>
